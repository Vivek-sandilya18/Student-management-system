<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Students</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">


</head>
<body class="students-page">

<div class="container mt-4">
    <h2>Students-List</h2>

    <a href="/add-new-student" class="btn btn-success mb-3">Add New Student</a>

    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
                <th>Fees</th>
                <th>Action</th>
            </tr>
        </thead>
		<tbody>
		    <tr th:each="s : ${students}">
		        <td th:text="${s.id}"></td>
		        <td th:text="${s.name}"></td>
		        <td th:text="${s.email}"></td>
		        <td th:text="${s.course}"></td>
		        <td th:text="${s.Fees}"></td>
		        <td>
		            <a th:href="@{/editStudent/{id}(id=${s.id})}"
		               class="btn btn-warning btn-sm">Edit</a>

		            <a th:href="@{/deleteStudent/{id}(id=${s.id})}"
		               class="btn btn-danger btn-sm"
		               onclick="return confirm('Delete this student?')">
		               Delete
		            </a>
					
		        </td>
				
		    </tr>
			<a href="/dashboard" class="btn btn-secondary">Back</a>
		    <!-- optional: no data message -->
		    <tr th:if="${#lists.isEmpty(students)}">
		        <td colspan="6" class="text-center text-muted">
		            No students found
		        </td>
		    </tr>
		</tbody>


    </table>
</div>

</body>
</html>
