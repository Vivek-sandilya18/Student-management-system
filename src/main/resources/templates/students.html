<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="students-page" onload="loadStudents(0)">

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4 d-flex justify-content-between">

    <span class="navbar-brand">🎓 Student Management</span>

    <!-- 📊 Stats Dropdown -->
    <div class="dropdown">
        <button class="btn btn-outline-light dropdown-toggle" data-bs-toggle="dropdown">
            📊 Stats
        </button>

        <div class="dropdown-menu dropdown-menu-end p-3" style="min-width:260px;">

            <p>👨‍🎓 Total Students: <b th:text="${totalStudents}"></b></p>
            <p>💰 Total Fees: <b th:text="${totalFees}"></b></p>
            <p>📚 Total Courses: <b th:text="${totalCourses}"></b></p>

            <hr>

            <small><b>🆕 Recently Added:</b></small>
            <div>
                <span th:each="s : ${recentStudents}" th:text="${s.name} + ', '"></span>
            </div>

            <hr>

            <small><b>🗑️ Recently Deleted:</b></small>
            <div>
                <span th:each="s : ${recentDeleted}" th:text="${s.name} + ', '"></span>
            </div>

        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- 🔥 TOP BAR -->
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">

        <h3 class="mb-0">Students List</h3>

        <!-- 🔍 LIVE SEARCH -->
        <input type="text" id="searchInput"
               class="form-control"
               style="max-width:300px;"
               placeholder="Search name / email / course"
               onkeyup="liveSearch()">

        <div>
            <a href="/add-new-student" class="btn btn-success">+ Add</a>
            <a href="/dashboard" class="btn btn-secondary">Back</a>
        </div>

    </div>

    <!-- 🔥 TABLE -->
    <table class="table table-bordered table-hover shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
                <th>Fees</th>
				<th>Phone</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="studentTable"></tbody>
    </table>

    <!-- 🔥 PAGINATION -->
    <div id="pagination" class="text-center mt-3"></div>

</div>

<!-- 🔥 JS -->
<script>

let timeout = null;
let currentPage = 0;

// 🔥 LOAD DATA
function loadStudents(page) {
    currentPage = page;

    let keyword = document.getElementById("searchInput").value;

    fetch(`/students-data?page=${page}&keyword=${keyword || ""}`)
        .then(res => res.json())
        .then(data => {

            let table = document.getElementById("studentTable");
            table.innerHTML = "";

            data.content.forEach(s => {
                table.innerHTML += `
                    <tr>
                        <td>${s.id}</td>
                        <td>${s.name}</td>
                        <td>${s.email}</td>
                        <td>${s.course}</td>
                        <td>${s.fees}</td>
						<td>${s.phone}</td>
                        <td>
                            <a href="/editStudent/${s.id}" class="btn btn-warning btn-sm">Edit</a>
                            <a href="/deleteStudent/${s.id}" class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this student?')">Delete</a>
                        </td>
                    </tr>
                `;
            });

            if (data.content.length === 0) {
                table.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center text-muted">
                            No students found
                        </td>
                    </tr>
                `;
            }

            renderPagination(data);
        });
}

// 🔍 LIVE SEARCH
function liveSearch() {
    clearTimeout(timeout);

    timeout = setTimeout(() => {
        loadStudents(0);
    }, 300);
}

// 🔥 PAGINATION
function renderPagination(data) {
    let pagination = document.getElementById("pagination");
    pagination.innerHTML = "";

    if (!data.first) {
        pagination.innerHTML += `
            <button class="btn btn-dark me-2" onclick="loadStudents(${data.number - 1})">
                Prev
            </button>`;
    }

    for (let i = 0; i < data.totalPages; i++) {
        pagination.innerHTML += `
            <button class="btn ${i === data.number ? 'btn-primary' : 'btn-outline-primary'} me-1"
                    onclick="loadStudents(${i})">
                ${i + 1}
            </button>`;
    }

    if (!data.last) {
        pagination.innerHTML += `
            <button class="btn btn-dark ms-2" onclick="loadStudents(${data.number + 1})">
                Next
            </button>`;
    }
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
