<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    font-family:Arial, sans-serif;
    overflow:hidden;
}

/* Floating circles */
.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    animation:float 8s infinite linear;
}

.circle:nth-child(1){
    width:120px;
    height:120px;
    top:10%;
    left:10%;
}

.circle:nth-child(2){
    width:180px;
    height:180px;
    bottom:10%;
    right:10%;
    animation-duration:10s;
}

.circle:nth-child(3){
    width:80px;
    height:80px;
    top:70%;
    left:20%;
    animation-duration:6s;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-25px);}
    100%{transform:translateY(0px);}
}

.card-box{
    width:430px;
    padding:35px;
    border-radius:20px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    box-shadow:0 8px 32px rgba(0,0,0,0.35);
    color:white;
    animation:zoomIn 1s ease;
}

@keyframes zoomIn{
    from{
        transform:scale(0.6);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.icon{
    width:80px;
    height:80px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    margin-bottom:20px;
    animation:pulse 1.8s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(0,114,255,0.6);}
    70%{box-shadow:0 0 0 20px rgba(0,114,255,0);}
    100%{box-shadow:0 0 0 0 rgba(0,114,255,0);}
}

h2{
    text-align:center;
    font-weight:700;
}

p{
    text-align:center;
    color:#e2e2e2;
    margin-bottom:25px;
}

.otp-input{
    height:55px;
    border-radius:12px;
    text-align:center;
    font-size:28px;
    letter-spacing:12px;
    font-weight:bold;
    border:none;
}

.otp-input:focus{
    box-shadow:0 0 10px #00c6ff;
}

.btn-custom{
    height:50px;
    border:none;
    border-radius:12px;
    font-weight:600;
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    transition:0.3s;
}

.btn-custom:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 15px rgba(0,114,255,0.4);
}

.footer-text{
    text-align:center;
    margin-top:18px;
    font-size:14px;
    color:#ddd;
}
</style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="card-box">

    <div class="icon">🔐</div>

    <h2>OTP Verification</h2>

    <p>Please enter the verification code sent to your email address.</p>

    <form th:action="@{/verifyOtp}" method="post">

        <div class="mb-3">
            <input type="text" name="otp" maxlength="6"
                   class="form-control otp-input"
                   placeholder="----" required>
        </div>

        <div th:if="${error}" class="alert alert-danger text-center p-2">
            <span th:text="${error}"></span>
        </div>

        <button type="submit" class="btn btn-custom w-100 text-white">
            Verify OTP
        </button>

    </form>

    <div class="footer-text">
        Student Management System
    </div>

</div>

</body>
</html>
