<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>OTP Verification</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #e0f2fe, rgb(0, 255, 64));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, Segoe UI, Roboto;
        }

        .card-box {
            width: 100%;
            max-width: 600px;
            background: rgb(128, 255, 255);
            border-radius: 36px;
            padding: 30px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            border: 1px solid #e5e7eb;
        }

        .title {
            font-size: 30px;
            font-weight: 700;
            text-align: center;
            color: #0f172a;
        }

        .subtitle {
            font-size: 23px;
            text-align: center;
            color: #64748b;
            margin-bottom: 18px;
        }

        .otp-input {
            width: 100%;
            height: 48px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            text-align: center;
            font-size: 18px;
            letter-spacing: 6px;
            outline: none;
            transition: 0.2s;
            background: #f8fafc;
        }

        .otp-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56,189,248,0.2);
            background: #ffffff;
        }

        .btn-submit {
            width: 100%;
            margin-top: 15px;
            padding: 11px;
            border-radius: 10px;
            border: none;
            background: #0ea5e9;
            color: white;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-submit:hover {
            background: #0284c7;
        }

        .alert-box {
            font-size: 20px;
            padding: 8px;
            border-radius:18px;
            margin-bottom: 12px;
        }

        .demo {
            font-size: 20px;
            text-align: center;
            background: #ecfdf5;
            color: #065f46;
            padding: 7px;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .resend {
            text-align: center;
            font-size: 20px;
            margin-top: 14px;
            color: #64748b;
        }

        .resend a {
            color: #0ea5e9;
            font-weight: 600;
            text-decoration: none;
        }

        .resend a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="card-box">

    <div class="title">OTP Verification</div>
    <div class="subtitle">Enter the 6-digit code </div>

    <!-- ERROR -->
    <div th:if="${error}" class="alert alert-danger alert-box">
        <span th:text="${error}"></span>
    </div>

    <!-- DEMO OTP -->
    <div th:if="${otp}" class="demo">
        Demo OTP: <b th:text="${otp}"></b>
    </div>

    <form action="/verifyOtp" method="post">

        <input type="text"
               name="otp"
               class="otp-input"
               placeholder="Enter OTP"
               maxlength="6"
               required>

        <button type="submit" class="btn-submit">
            Verify OTP
        </button>

    </form>

    <div class="resend">
        Didn’t receive OTP? <a href="#">Resend</a>
    </div>

</div>

</body>
</html>
