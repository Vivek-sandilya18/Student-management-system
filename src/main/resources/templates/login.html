<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
	<!-- HEAD section -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

	<body class="login-page">

<div class="container mt-5">
    <div class="card col-md-4 mx-auto p-4">
        <h3 class="text-center">Student Management Login</h3>
		<form action="/dashboard" method="get">

		    <!-- Username: only numbers -->
		    <input type="text" 
		           name="username"
		           class="form-control mb-2"
		           placeholder="Username (Your roll  number)"
		           pattern="[0-9]+"
		           title="Username must contain only numbers"
		           required>

		    <!-- Password: email format -->
		    <input type="email" 
		           name="password"
		           class="form-control mb-2"
		           placeholder="Enter Email as Password"
		           required>

		    <button type="submit" class="btn btn-primary w-100">Login</button>

		</form>
    </div>
</div>

</body>
</html>
