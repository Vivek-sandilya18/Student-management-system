<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="add-edit-page">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Student Management System</span>
        <a href="/students" class="btn btn-light btn-sm">Back</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-6 mx-auto">

            <div class="card shadow p-4">
                <h3 class="text-center mb-3">Edit Student Details</h3>

                <!-- ✅ CHANGE ONLY THIS LINE -->
                <form th:action="@{/updateStudent}" method="post" th:object="${student}">

                    <input type="hidden" th:field="*{id}" />

                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" th:field="*{name}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" th:field="*{email}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Course</label>
                        <input type="text" th:field="*{course}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Fees</label>
                        <input type="number" th:field="*{fees}" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" th:field="*{phone}" 
                               class="form-control" 
                               pattern="[0-9]{10}" 
                               maxlength="10" 
                               required>
                    </div>

                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-primary">Update Student</button>
                        <a href="/students" class="btn btn-secondary">Cancel</a>
                    </div>

                </form>

            </div>

        </div>
    </div>
</div>

</body>
</html>
