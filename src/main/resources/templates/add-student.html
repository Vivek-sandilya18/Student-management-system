<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="add-edit-page">

<div class="container mt-5" style="max-width:600px;">

    <h2 class="mb-4 text-center">🎓 Add Student</h2>

    <!-- ❌ ERROR MESSAGE -->
    <div th:if="${error}" class="alert alert-danger text-center">
        <span th:text="${error}"></span>
    </div>

    <!-- ✅ SUCCESS MESSAGE -->
    <div th:if="${success}" class="alert alert-success text-center">
        <span th:text="${success}"></span>
    </div>

    <div class="card shadow p-4">

        <!-- 🔥 IMPORTANT CHANGE HERE -->
        <form th:action="@{/sendOtp}" method="post" th:object="${student}">

            <!-- Name -->
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control" required>
            </div>

            <!-- Course -->
            <div class="mb-3">
                <label class="form-label">Course</label>
                <input type="text" th:field="*{course}" class="form-control" required>
            </div>

            <!-- Fees -->
            <div class="mb-3">
                <label class="form-label">Fees</label>
                <input type="number" th:field="*{fees}" class="form-control" required>
            </div>

            <!-- Phone -->
            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text"
                       th:field="*{phone}"
                       class="form-control"
                       placeholder="Enter 10 digit number"
                       pattern="[0-9]{10}"
                       maxlength="10"
                       required>
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-between">
                <a href="/dashboard" class="btn btn-secondary">⬅ Back</a>
                <button type="submit" class="btn btn-primary">📩 Send OTP</button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
